services:
  - type: web
    name: reject-me-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false # Set this to your Render URL after deployment
      - key: WEBHOOK_PATH
        value: /webhook
      - key: APP_HOST
        value: 0.0.0.0
